services:
  # Backend service
  - type: web
    name: college-complaint-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./complaints.db
      - key: PYTHON_VERSION
        value: 3.10.0

  # Frontend service
  - type: static
    name: college-complaint-frontend
    env: static
    buildCommand: npm install && npm run build
    publishDir: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: college-complaint-backend
          property: host
